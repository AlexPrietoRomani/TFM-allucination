version: '3'
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tfm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: tfm-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: tfm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

  app:
    build: .
    container_name: tfm-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_HOST=redis
      - QDRANT_URL=http://qdrant:6333
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=none
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis
      - ollama
    volumes:
      - .:/app
      - /app/.venv

  worker:
    build: .
    container_name: tfm-worker
    command: [ "uv", "run", "rq", "worker", "-u", "redis://redis:6379" ]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_HOST=redis
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
      - ollama
    volumes:
      - .:/app
      - /app/.venv
