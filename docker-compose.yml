services:
  # ─── Cache / Cola de Tareas ────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: tfm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Aplicación Principal ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfm-app
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=redis
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=none
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
    restart: unless-stopped

  # ─── Worker Asíncrono (RQ) ────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfm-worker
    command: ["uv", "run", "rq", "worker", "-u", "redis://redis:6379"]
    environment:
      - REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
    restart: unless-stopped

# ─── Volúmenes nombrados ──────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
