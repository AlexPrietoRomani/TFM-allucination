- id: formato-evaluacion-plagas-senasa
  title: Formato de Evaluación de Plagas para Certificación de Lugar de Producción (Anexo 1.3)
  url: https://www.senasa.gob.pe/senasa/wp-content/uploads/2019/02/Anexo-1.3-Formato-evaluacion-de-plagas-para-certificaci%C3%B3n-de-lugar-de-producci%C3%B3n_01.xlsx
