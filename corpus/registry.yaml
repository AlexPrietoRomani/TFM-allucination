  description: Formato en Excel (Anexo 1.2 de SENASA) que el productor debe completar con su Plan de Manejo
    Fitosanitario en campo. En este plan se listan todas las aplicaciones de plaguicidas (químicos y biológicos)
    programadas para el control de plagas en el cultivo destinado a exportación, indicando producto/componente
    activo, dosis, frecuencia, intervalo de reingreso (REI) y período de carencia (PHI) correspondiente.
    Es un requisito obligatorio que refleja las estrategias de control planificadas en el lugar de producción
    de arándano, asegurando el cumplimiento de límites máximos de residuos y otras normativas. El plan
    firmado se presenta a SENASA para la certificación del campo exportador.
