  description: 'Formato oficial en Excel (Anexo 1.3) utilizado por SENASA para registrar la evaluación
    de plagas en un lugar de producción que solicita certificación para exportar. En este formulario se
    consignan los datos de la inspección fitosanitaria del campo: identificación del predio, fecha de
    evaluación, plagas encontradas y porcentaje de infestación o incidencia por cada una, conforme a los
    muestreos realizados. Sirve para determinar si el campo de arándano cumple con las tolerancias de
    plagas establecidas (Anexo 1.6) previo a la cosecha y exportación. Este registro, validado por el
    inspector, es parte del expediente de certificación del huerto exportador.'
  year: 2019
  country: Perú
