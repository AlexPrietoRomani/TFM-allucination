  description: Guía anual de manejo integrado de plagas y enfermedades en arándano para la región sureste
    de EE.UU. Incluye recomendaciones actualizadas de control químico (con intervalos de reingreso – REI
    y periodos de carencia – PHI), métodos biológicos y culturales, y listados de plaguicidas con sus
    eficacias. Es una publicación conjunta de instituciones de extensión agrícola del sureste de EE.UU.,
    liderada por la Universidad de Georgia.
