  - Perú
  description: Protocolo fitosanitario suscrito entre Perú y China (2016) que establece las medidas cuarentenarias
    y requisitos que deben cumplir los lugares de producción y las empacadoras peruanas para exportar
    arándanos frescos a China. El documento describe el plan de trabajo acordado con la autoridad china
    (AQSIQ), incluyendo registro oficial de campos y packing, supervisión de plagas cuarentenarias (como
    moscas de la fruta), manejo fitosanitario en campo (monitoreos, controles y registros), tratamientos
    poscosecha (cuando corresponda) y procedimientos de inspección/certificación previos al envío. Este
    protocolo es obligatorio para acceder al mercado chino.
  year: 2016
  country: Perú
  source: Servicio Nacional de Sanidad Agraria – SENASA Perú
  doc_type: Protocolo fitosanitario
  checksum: 315b33c395ac74ded29a222246c1cfb6ac4235426e1fe811ef84c0151ed6512a
- id: lineamientos-mip-senasa
  title: Lineamientos del Manejo Integrado de Plagas (MIP) en Lugares de Producción (Anexo 1.1)
  url: https://www.senasa.gob.pe/senasa/wp-content/uploads/2016/11/Anexo-1.1-Lineamientos-MIP.docx
  type: docx
  language: es
  tags:
  - manejo integrado de plagas
  - MIP
  - certificación fitosanitaria
  - campo de exportación
  - Perú
  description: 'Documento normativo de SENASA Perú (Anexo 1.1 del procedimiento de exportación) que establece
    las pautas de Manejo Integrado de Plagas en los lugares de producción destinados a exportar. Detalla
    las consideraciones y buenas prácticas que el productor debe implementar: monitoreo periódico de plagas,
    control cultural (sanitación de campo, eliminación de hospederos), uso de control biológico, rotación
    de plaguicidas según FRAC/IRAC para prevenir resistencia, registro de aplicaciones y evaluación de
    efectividad. El cumplimiento de estos lineamientos de MIP es verificado por SENASA como parte de la
    certificación del campo para exportación (por ejemplo, en arándano u otros cultivos).'
  year: 2016
  country: Perú
  source: Servicio Nacional de Sanidad Agraria – SENASA Perú
  doc_type: Norma técnica MIP (guía de manejo integrado)
  checksum: 80802802cd229e21a170a565f7a36b9b44ce3d6a3565ede253626e0a51c1b124
- id: plan-manejo-fitosanitario-senasa
  title: Plan de Manejo Fitosanitario para el Control de Plagas (Anexo 1.2)
  url: https://www.senasa.gob.pe/senasa/wp-content/uploads/2016/11/Anexo-1.2-Plan-de-manejo-fitosanitario-para-control-de-plagas-en-LP.xlsx
  type: xlsx
  language: es
  tags:
