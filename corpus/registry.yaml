  description: Manual técnico integral sobre el cultivo del arándano en Chile, publicado por INIA. Cubre
    la instalación del huerto, manejo agronómico (suelo, riego, poda, nutrición), control de plagas y
    enfermedades, y aspectos de cosecha y poscosecha para exportación. Es una obra de referencia con aportes
    de especialistas, que consta de ~120 páginas con recomendaciones adaptadas a condiciones chilenas.
