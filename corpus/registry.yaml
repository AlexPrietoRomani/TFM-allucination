  description: Guía oficial del Servicio Agrícola y Ganadero de Chile (SAG) que detalla los requisitos
    fitosanitarios y procedimientos para exportar arándanos frescos desde Chile a China. Incluye las obligaciones
    para inscribir huertos, packings y frigoríficos, Buenas Prácticas Agrícolas requeridas, manejo fitosanitario
    del huerto (por ejemplo, control de frutos caídos, monitoreo de plagas de importancia cuarentenaria),
    procedimientos de inspección y certificación fitosanitaria, de acuerdo al protocolo bilateral Chile–China
    firmado en 2015.
