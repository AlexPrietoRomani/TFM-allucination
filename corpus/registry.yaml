- id: enfermedades-fungosas-arandano-2023
  title: Prospección y alternativas de manejo de enfermedades fungosas asociadas en el cultivo de arándano
    (Vaccinium corymbosum L.)
  url: https://revistas.unitru.edu.pe/index.php/agroindscience/article/download/5777/5821/21952
  type: pdf
  language: es
  tags:
  - enfermedades fúngicas
  - arándano
  - manejo integrado
  - investigación
  - Perú
  description: Artículo científico publicado en *Agroindustrial Science* (Univ. Nacional de Trujillo,
    Perú) en 2023, que caracteriza las principales enfermedades fúngicas del arándano en la zona de Trujillo
    y propone estrategias de manejo. Se identificaron patógenos como *Pestalotia* sp. (mancha foliar,
    tizón de tallos), *Thekopsora minima* (roya de la hoja), *Botrytis cinerea* (moho gris) y *Lasiodiplodia
    theobromae* (muerte regresiva). El estudio recomienda implementar un plan de manejo integrado para
    controlar estas enfermedades (medidas culturales, fungicidas específicos, controles biológicos) a
    fin de reducir pérdidas y cumplir estándares fitosanitarios de exportación. Es un ejemplo de investigación
    aplicada al manejo fitosanitario en arándano peruano.
  year: 2023
  country: Perú
  source: Revista Agroindustrial Science (Univ. Nac. de Trujillo)
  doc_type: Artículo científico
  checksum: acca4266bfb483234082dc1b8d74571d785e1efb9d91e6d3a716741e6f67af5e
