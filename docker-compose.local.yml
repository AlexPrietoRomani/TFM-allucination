# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.local.yml — Override para entorno 100% On-Premise
# ═══════════════════════════════════════════════════════════════════════════════
# Uso: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Base de Datos Vectorial (Local) ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tfm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── LLM Local (Ollama) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: tfm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 6G

  # ─── Override: App depende de Qdrant + Ollama locales ──────────────────────
  app:
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_LOCAL_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ─── Override: Worker depende de Qdrant + Ollama locales ───────────────────
  worker:
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_LOCAL_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

# ─── Volúmenes nombrados adicionales (Solo Local) ─────────────────────────
volumes:
  qdrant_data:
    driver: local
  ollama_data:
    driver: local
